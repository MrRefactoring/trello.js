name: schema-audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit schemas against the live Trello API
        run: pnpm audit:schemas
        env:
          TRELLO_API_KEY: ${{ secrets.TRELLO_API_KEY }}
          TRELLO_API_TOKEN: ${{ secrets.TRELLO_API_TOKEN }}
          TRELLO_MEMBER2_ID: ${{ secrets.TRELLO_MEMBER2_ID }}
          TRELLO_MEMBER2_EMAIL: ${{ secrets.TRELLO_MEMBER2_EMAIL }}
